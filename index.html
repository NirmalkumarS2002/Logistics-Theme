<style>
    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }

    html,
    body {
        overflow-x: hidden;
        scroll-behavior: smooth;
    }

    .nav-header-icons,
    .nav-main-container {
        display: none;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px;
        background: red;
        padding: 10px;
        border-radius: 20px;
        font-family: "Noto Sans", sans-serif;
    }

    .gird-menu-container {
        display: flex;
        align-items: center;
    }

    .gridmenu {
        font-size: 25px;
        color: white;
    }

    .company-logo {
        width: 190px;
    }

    .nav-links {
        display: flex;
        gap: 30px;
    }

    .nav-links a {
        font-size: 18px;
        text-decoration: none;
        color: white;
    }

    .nav-links a span {
        display: none;
    }

    .nav-no {
        font-size: 18px;
        text-decoration: none;
        color: white;
    }

    .search-icons {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .search-icons a {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .search-icons a span {
        font-size: 25px;
        color: white;
    }

    .ship-btn {
        padding: 20px 30px;
        border-radius: 30px;
        border: none;
        font-size: 15px;
    }

    .menu-btn {
        display: none;
        font-size: 25px;
        font-weight: bold;
        color: white;
    }

    @media (max-width:1180px) {


         .company-logo{
            width: 160px;
         }
        .nav-container {
            position: fixed;
            display: block;
            background: black;
            height: 100vh;
            min-width: 320px;
            right: 0px;
            top: 0;
            padding: 20px 40px;
            transform: translateX(100%);
            transition: .4s;
            overflow-x: hidden;
        }

 

    .nav-container.show {
        transform: translateX(0);
    }

    .nav-header-icons {
        color: white;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-bottom: 40px;
    }



    .nav-detais {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }

    .nav-detais h2 {
        color: white;
        font-size: 20px;
        margin-bottom: 10px;
    }

    .nav-detais a {
        margin-bottom: 10px;
        text-decoration: none;
        color: white;
        font-size: 15px;
        letter-spacing: 2px;
    }

    .nav-sotial-links {
        display: flex;
        gap: 15px;
        font-size: 24px;
        margin-bottom: 30px;
    }

    .nav-sotial-links a {
        color: white;
    }

    .nav-btn-conatainer button {
        display: flex;
        align-items: center;
        padding-left: 10px;
        width: 100%;
        border-radius: 10px;
        justify-content: space-between;
        background: transparent;
        color: white;
        border: 1px solid #EF644C;
        overflow: hidden;
    }


    .nav-btn-conatainer button span {
        background: #EF644C;
        padding: 10px 10px;
        overflow: hidden;
    }


    .nav-links {
        flex-direction: column;
        gap: 15px;
        margin-bottom: 40px;
    }

    .nav-links a {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .nav-links a span {
        display: block;
        font-size: 20px;
    }

    .nav-links a {
        font-size: 15px;
    }

    .nav-no {
        display: none;
    }

    .search-icons {
        display: none;
    }

    .gird-menu-container {
        display: none;
    }

    .ship-btn {
        display: none;
    }


    .nav-main-container {
        display: block;
    }

    .menu-btn {
        display: block;
    }

    .close-btn {
        z-index: 1999;
    }
   }

<body>

                <a href="">About Us<span class="material-symbols-outlined">keyboard_arrow_right</span></a>

                    <a href=""><i class="fa-brands fa-whatsapp"></i></a>

        <a href="" class="nav-no">+91 09876 12345</a>

        <div class="search-icons">

        </div>

        <button class="ship-btn">Track Shipment</button>

        <span class="material-symbols-outlined menu-btn">Menu</span>


    </section>

    <script>


        const menuBtn = document.querySelector(".menu-btn");
        const navContainer = document.querySelector(".nav-container");
        const closeBtn = document.querySelector(".close-btn");

        menuBtn.addEventListener("click", () => {
            navContainer.classList.toggle("show");
        });

        closeBtn.addEventListener("click", () => {
            navContainer.classList.remove("show");
        });

        document.querySelectorAll('*').forEach(el => {
    if (el.scrollWidth > document.documentElement.clientWidth) {
        console.log(el);
    }
});

    </script>
