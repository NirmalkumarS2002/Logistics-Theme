<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Logistic Login Page</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />

    <link
        href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oldenburg&family=Outfit:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<style>
    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        font-family: "Noto Sans", sans-serif;
    }


    :root {
        --pcolor: #EF644C
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
        background: linear-gradient(135deg, rgb(211, 211, 211), rgb(180, 180, 180));
        position: relative;
    }

    .loginpage {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 600px;
        background: white;
        width: 100%;
        max-width: 1000px;
        border-radius: 20px;
        box-shadow: 1px 1px 30px rgba(255, 255, 255, 0.397);
        overflow: hidden;
    }

    .right {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(125deg, #00000096, #00000098), url("./src/login2.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        position: relative;
        padding: 15px;
    }

    .right img {
        width: 160px;
        position: absolute;
        top: 20px;
        left: 20px;
    }

    .right h1 {
        font-size: clamp(30px, 3.5vw, 45px);
        text-transform: capitalize;
        margin-bottom: 10px;
        color: white;
    }

    .right p {
        font-size: 15px;
        max-width: 300px;
        text-align: center;
        line-height: 1.5;
        margin-bottom: 20px;
        color: white;
    }

    .pagebtn {
        width: 100%;
        max-width: 200px;
        display: flex;
        justify-content: space-between;
        border: none;
        padding-left: 10px;
        align-items: center;
        border: 1px solid white;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        z-index: 1;
        transform: .5s ease;

    }

    .pagebtn::before {
        content: "";
        position: absolute;
        background: var(--pcolor);
        height: 100%;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: -1;
        width: 0;
        transition: .4s ease;
    }

    .pagebtn:hover::before {
        width: 100%;
    }

    .pagebtn:hover {
        color: white;
    }




    .pagebtn span {
        background: var(--pcolor);
        padding: 10px;
        color: white;
        font-size: 24px;
        border-radius: 10px;

    }



    .left {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
    }


    .left h1 {
        font-size: clamp(25px, 3vw, 35px);
        margin-bottom: 10px;
        color: var(--pcolor);
    }

    .left>p {
        font-size: 13px;
        max-width: 300px;
        line-height: 1.5;
        text-align: center;
        margin-bottom: 15px;
    }

    .form {
        width: 100%;
        max-width: 350px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .labelbox {
        margin-bottom: 10px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .labelbox label {
        font-size: 12px;
        font-weight: bold;
        color: var(--pcolor);
    }

    .inputbox {
        position: relative;
    }

    .inputbox input{
        width: 100%;
        padding: 13px 40px;
        border-radius: 7px;
        font-size: 12px;
        border: 1px solid var(--pcolor);
    }


    .inputbox .ispan {
        position: absolute;
        left: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--pcolor);
    }

    .inputbox .lock {
        position: absolute;
        left: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--pcolor);
    }

    .inputbox .passeye {
        position: absolute;
        right: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--pcolor);
    }

    .left .pagebtn {
        border: 1px solid var(--pcolor);
        max-width: 60%;
        background: white;
        margin-block: 15px;
    }

    .left .pagebtn span {
        font-size: 24px;
    }

    .formfooter {
        text-align: center;
    }

    .formfooter div {
        display: flex;
        gap: 10px;
        margin-bottom: 5px;

    }

    .formfooter p {
        font-size: 13px;
    }

    .formfooter a {
        font-size: 13px;
        text-decoration: none;
        color: var(--pcolor);
        font-weight: 600;
    }

    @media (max-width:800px) {
        .loginpage {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .right {
            position: relative;
        }

        .right img {
            left: 50%;
            transform: translateX(-50%);
            top: 80px;
        }

    }

    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
        display: none;
    }

    .custom-select {
        position: relative;
        width: 100%;
  
        border-radius: 7px;

        border: 1px solid var(--pcolor);
    }

    .select-btn {
        height: 45px;
        border: 1px solid var(--hcolor);
        border-radius: 10px;
        padding: 0 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        background: #fff;
        transition: .3s;
             
    }

    .select-btn:hover {
        border-color: var(--hcolor);
    }

    .select-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .select-left .material-symbols-outlined {
        color:#EF644C;
        font-size: 22px;
    }

    .selected-text {
         font-size: 12px;
    }

    .arrow {
        color: var(--hcolor);
        transition: .3s;
    }

    .arrow.rotate {
        transform: rotate(180deg);
    }

    .options {
        position: absolute;
        top: 55px;
        left: 0;
        width: 100%;
        list-style: none;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0, 0, 0, .08);
        display: none;
        z-index: 100;
    }

    .options.active {
        display: block;
    }

    .options li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 15px;
        cursor: pointer;
        transition: .3s;
    }

    .options li:hover {
        background: #fff2ee;
    }

    .options li .material-symbols-outlined {
        color: #EF644C;
    }
</style>

<body>


    <section class="loginpage">
        <div class="right">
            <img src="./src/logo.webp" alt="Company Logo">
            <h1>welcome Back</h1>
            <p>To keep connected with us Please
                Login with your personal info</p>
        </div>

        <div class="left">
            <h1>Login Account</h1>
            <p>Access Your Logistics Dashboard</p>

            <form class="form">

                <div class="labelbox">
                    <label>Select Role</label>

                    <div class="custom-select">

                        <div class="select-btn">
                            <div class="select-left">
                                <span class="material-symbols-outlined">delivery_truck_speed</span>
                                <span class="selected-text">Select Role</span>
                            </div>

                            <span class="material-symbols-outlined arrow">
                                keyboard_arrow_down
                            </span>
                        </div>

                        <ul class="options">
                            <li data-value="Admin">

                                Admin
                            </li>

                            <li data-value="Client">
            
                                Client
                            </li>
                        </ul>

                        <input type="hidden" id="role" name="role">

                    </div>
                </div>

                <div class="labelbox">
                    <label for="Email">Email</label>
                    <div class="inputbox">
                        <input type="email" placeholder="Enter Your Email" id="Loginemail">
                        <span class="material-symbols-outlined ispan">
                            mail
                        </span>
                    </div>
                </div>

                <div class="labelbox">
                    <label for="password">Password</label>
                    <div class="inputbox">
                        <span class="material-symbols-outlined lock">
                            lock
                        </span>
                        <input type="password" placeholder="Enter Your Password" id="loginpass">
                        <span class="material-symbols-outlined passeye">
                            visibility
                        </span>
                    </div>
                </div>

                <button type="submit" class="loginbtn pagebtn">Login Now <span class="material-symbols-outlined">
                        login
                    </span></button>
            </form>

            <div class="formfooter">
                <div>
                    <p>Neew to Our Customer?</p><a href="sign.html">Create Accout</a>
                </div>
                <a href="404.html">Forget Password?</a>

            </div>


        </div>

    </section>
    <script>
        const form = document.querySelector(".form")
        const role = document.querySelector("#role")
        const loginemail = document.querySelector("#Loginemail")
        const loginpass = document.querySelector("#loginpass")

        const emailregex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

        form.addEventListener("submit", (e) => {
            e.preventDefault()
            if (role.value.trim() == "") {
                alert("please select your rold");
                role.focus();
                return;
            }
            if (loginemail.value.trim() == "") {
                alert("please enter Your Email")
                loginemail.focus();
                return;
            }

            if (!emailregex.test(loginemail.value.trim())) {
                alert("pleae enter valid email")
                loginemail.focus();
                return;
            }

            if (loginpass.value.trim() == "") {
                alert("pleae enter Your Password")
                loginpass.focus();
                return;
            }

            if (loginpass.value.trim().length < 6) {
                alert("password mustbe in six chars")
                loginpass.focus();
                return;
            }

            //save email

            localStorage.setItem("useremail", loginemail.value.trim())


            //navigatie to respective page

            if (role.value == "Admin") {
                window.location.href = "admin.html"
            }

            if (role.value == "Client") {
                window.location.href = "client.html"
            }

            alert("Login Successfully!")

        })

        //eye 

        const eye = document.querySelector(".passeye");
        const password = document.querySelector("#loginpass");

        eye.addEventListener("click", () => {

            if (password.type === "password") {
                password.type = "text";
                eye.textContent = "visibility_off";
            } else {
                password.type = "password";
                eye.textContent = "visibility";
            }

        });


        //dp

        const selectBtn = document.querySelector(".select-btn");
        const options = document.querySelector(".options");
        const selectedText = document.querySelector(".selected-text");
        const role1 = document.querySelector("#role");
        const arrow = document.querySelector(".arrow");

        selectBtn.addEventListener("click", () => {
            options.classList.toggle("active");
            arrow.classList.toggle("rotate");
        });

        document.querySelectorAll(".options li").forEach((item) => {

            item.addEventListener("click", () => {

                selectedText.textContent = item.textContent.trim();
                role1.value = item.dataset.value;

                options.classList.remove("active");
                arrow.classList.remove("rotate");

            });

        });

        document.addEventListener("click", (e) => {

            if (!e.target.closest(".custom-select")) {
                options.classList.remove("active");
                arrow.classList.remove("rotate");
            }

        });

    </script>
</body>

</html>
