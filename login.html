<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Logistic Login Page</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,-50..200" />

    <link
        href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oldenburg&family=Outfit:wght@100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<style>
    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        font-family: "Noto Sans", sans-serif;
    }


    :root {
        --pcolor: #EF644C
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
        background: gray;
    }

    .loginpage {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 600px;
        background: white;
        width: 100%;
        max-width: 1000px;
        border-radius: 20px;
        overflow: hidden;
    }

    .right {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: var(--pcolor);
        position: relative;
    }

    .right img {
        width: 160px;
        position: absolute;
        top: 20px;
        left: 20px;
    }

    .right h1 {
        font-size: 45px;
        text-transform: capitalize;
        margin-bottom: 10px;
        color: white;
    }

    .right p {
        font-size: 15px;
        max-width: 300px;
        text-align: center;
        line-height: 1.5;
        margin-bottom: 20px;
        color: white;
    }

    .pagebtn {
        width: 100%;
        max-width: 200px;
        display: flex;
        justify-content: space-between;
        border: none;
        padding-left: 10px;
        align-items: center;
        border: 1px solid black;
        border-radius: 10px;
        overflow: hidden;
    }

    .pagebtn span {
        background: var(--pcolor);
        padding: 10px;
        color: white;
        font-size: 24px;
        border-radius: 10px;
    }

    .left {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .left h1 {
        font-size: 35px;
        margin-bottom: 10px;
    }

    .left>p {
        font-size: 13px;
        max-width: 300px;
        line-height: 1.5;
        text-align: center;
        margin-bottom: 15px;
    }

    .labelbox {
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .labelbox label {
        font-size: 14px;
        color: var(--pcolor);
    }

    .inputbox {
        position: relative;
    }

    .inputbox input,
    select {
        width: 100%;
        padding: 10px 40px;
        border-radius: 7px;
        border: 1px solid var(--pcolor);
    }


    .inputbox .ispan {
        position: absolute;
        left: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
    }

    .inputbox .lock {
        position: absolute;
        left: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
    }

    .inputbox .passeye {
        position: absolute;
        right: 10px;
        font-size: 20px;
        top: 50%;
        transform: translateY(-50%);
    }

    .left .pagebtn {
        border: 1px solid var(--pcolor);
        max-width: 100%;
        margin-block: 15px;
    }

    .left .pagebtn span {
        font-size: 20px;
    }

    .formfooter {
        text-align: center;
    }

    .formfooter div{
        display: flex;
        gap: 10px;
        margin-bottom: 5px;

    }

    .formfooter p {
        font-size: 13px;
    }

    .formfooter a {
        font-size: 13px;
        text-decoration: none;
    }
</style>

<body>
    <section class="loginpage">
        <div class="right">
            <img src="./src/logo.webp" alt="Company Logo">
            <h1>welcome Back</h1>
            <p>To keep connected with us Please
                Login with your personal info</p>
            <button class="pagebtn">Sign Up <span class="material-symbols-outlined">
                    login
                </span></button>
        </div>

        <div class="left">
            <h1>Login Account</h1>
            <p>Secure Access fo;r Store Managers , Staff and Delivery Partners</p>

            <form class="form">

                <div class="labelbox">
                    <label for="role">Select Role</label>
                    <div class="inputbox">
                        <select name="role" id="role">
                            <option value="">Select Role</option>
                            <option value="Admin">Admin</option>
                            <option value="Client">Client</option>
                        </select>
                        <span class="material-symbols-outlined ispan">
                            delivery_truck_speed
                        </span>
                    </div>
                </div>

                <div class="labelbox">
                    <label for="Email">Email</label>
                    <div class="inputbox">
                        <input type="email" placeholder="Enter Your Email" id="Loginemail">
                        <span class="material-symbols-outlined ispan">
                            mail
                        </span>
                    </div>
                </div>

                <div class="labelbox">
                    <label for="password">Password</label>
                    <div class="inputbox">
                        <span class="material-symbols-outlined lock">
                            lock
                        </span>
                        <input type="password" placeholder="Enter Your Password" id="loginpass">
                        <span class="material-symbols-outlined passeye">
                            visibility
                        </span>
                    </div>
                </div>

                <button type="submit" class="loginbtn pagebtn">Login Now <span class="material-symbols-outlined">
                        login
                    </span></button>
            </form>

            <div class="formfooter">
                <div>
                    <p>Neew to Our Customer?</p><a href="sign.html">Create Accout</a>
                </div>
                <a href="404.html">Forget Password?</a>

            </div>


        </div>

    </section>
</body>

</html>
